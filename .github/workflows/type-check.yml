name: Type Check

on:
  push:
    paths:
      - "backend/**"
      - "frontend/**"
      - "common/**"
  workflow_dispatch:

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリチェック
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: ファイル状況確認
        run: ls -la

      - name: インストール
        working-directory: backend
        run: npm install --production=false

      - name: tsc で型チェック
        working-directory: backend
        run: npx tsc --noEmit
