name: Deploy Frontend to S3

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリチェック
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 依存関係インストール
        working-directory: frontend
        run: npm ci

      - name: ビルド（静的エクスポート）
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "https://api-aws.patient-management-kubo-works-projects.com"

      - name: AWS 認証設定
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: S3 へデプロイ
        run: |
          aws s3 sync frontend/out s3://aws.patient-management-kubo-works-projects.com \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          aws s3 sync frontend/out s3://aws.patient-management-kubo-works-projects.com \
            --delete \
            --cache-control "no-cache" \
            --include "*.html"

      - name: CloudFront キャッシュ無効化
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?@=='aws.patient-management-kubo-works-projects.com']].Id" \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/*"
