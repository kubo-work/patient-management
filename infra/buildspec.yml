version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo "Installing dependencies..."
      - cd backend/aws
      - npm ci

  build:
    commands:
      - echo "Running Prisma migration..."
      - echo "Database URL is set"
      - npx prisma migrate deploy
      - echo "Migration completed successfully!"

artifacts:
  files: []
